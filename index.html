<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Schedule Editor</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --border-color: #cbd5e1;
            --bg-light: #f8fafc;
            --text-main: #0f172a;
            --bar-color: #3b82f6;
            --milestone-color: #ef4444;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 10px 20px;
            background-color: #ffffff;
            color: var(--text-main);
            font-size: 12px;
        }

        .controls {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        button {
            cursor: pointer;
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: 13px;
        }

        .btn-import { background-color: #64748b; color: white; }
        .btn-export { background-color: #10b981; color: white; }
        .btn-print { background-color: var(--primary-color); color: white; }
        
        #drop-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            color: white;
            font-size: 24px;
            font-weight: bold;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .chart-container {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: white;
            overflow-x: auto;
            margin-bottom: 15px;
        }

        .gantt-wrapper {
            min-width: 1000px;
            padding: 10px 10px;
        }

        .timeline-header {
            display: flex;
            margin-left: 350px; 
            border-bottom: 2px solid var(--text-main);
            position: relative;
            height: 24px;
        }

        .timeline-header-cell {
            position: absolute;
            transform: translateX(-50%);
            font-size: 11px;
            font-weight: bold;
            bottom: 2px;
            transition: transform 0.2s ease;
        }

        .timeline-header-cell.vertical-text {
            transform: translateX(-50%) rotate(-90deg);
            bottom: 6px;
        }

        .gantt-row {
            display: flex;
            align-items: stretch;
            height: 20px; 
            border-bottom: 1px dashed #e2e8f0;
        }

        .gantt-row.major-section {
            border-top: 2px solid #64748b;
            margin-top: 2px;
        }

        .gantt-labels {
            width: 350px;
            min-width: 350px;
            display: flex;
            align-items: center;
            font-size: 11px;
            padding-right: 5px;
            border-right: 2px solid var(--text-main);
            background: #ffffff;
        }

        .label-wbs { width: 35px; font-weight: bold; }
        .label-title { flex-grow: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 5px; }
        .label-owner { width: 90px; color: #475569; text-align: right; overflow: hidden; white-space: nowrap;}
        
        .indented-title { padding-left: 15px !important; }

        .gantt-timeline {
            position: relative;
            flex-grow: 1;
            background-image: linear-gradient(to right, #f1f5f9 1px, transparent 1px);
        }

        .gantt-bar {
            position: absolute;
            top: 0;
            height: 100%; 
            background-color: var(--bar-color);
            border-radius: 0; 
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 10px;
            font-weight: bold;
            overflow: hidden;
            white-space: nowrap;
        }

        .gantt-milestone {
            position: absolute;
            top: 3px;
            width: 14px;
            height: 14px;
            background-color: var(--milestone-color);
            transform: rotate(45deg) translateX(-50%);
        }

        .table-container {
            overflow-x: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            background: var(--bg-light);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 3px 4px; 
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        th { background-color: #e2e8f0; font-size: 11px;}

        input[type="text"], input[type="number"] {
            width: 95%;
            padding: 3px 5px;
            border: 1px solid #94a3b8;
            border-radius: 3px;
            font-size: 11px;
            height: 16px;
        }

        input[type="number"] { width: 60px; }

        .actions-cell {
            white-space: nowrap;
            min-width: 100px;
        }

        /* Uniformly sized action buttons to preserve row height */
        .actions-cell button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 20px;
            width: 20px;
            padding: 0;
            margin: 0 1px;
            border-radius: 3px;
            font-size: 12px;
            border: none;
            cursor: pointer;
            vertical-align: middle;
        }

        .btn-add-inline { background-color: #10b981; color: white; font-weight: bold; font-size: 14px;}
        .btn-action { background-color: #e2e8f0; color: #333; }
        .btn-delete { background-color: #ef4444; color: white; }

        .popup-menu {
            display: none;
            position: absolute;
            background: white;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border-radius: 6px;
            z-index: 1000;
            min-width: 160px;
            overflow: hidden;
            font-size: 12px;
        }

        .popup-item {
            padding: 8px 12px;
            cursor: pointer;
            color: var(--text-main);
            transition: background 0.1s;
        }

        .popup-item:hover {
            background-color: #f1f5f9;
            color: var(--primary-color);
        }

        /* NEW PROGRESS TRACKING STYLES */
        .status-bar {
            margin: 15px 0;
            padding: 10px 15px;
            background-color: #f1f5f9;
            border-left: 4px solid var(--primary-color);
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
        }

        .chart-relative-wrapper {
            position: relative;
        }

        .timeline-marker {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            z-index: 10;
        }

        .marker-today {
            background-color: #10b981;
            pointer-events: none;
            display: none; /* Hidden until date is set */
        }

        .marker-today::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -5px;
            width: 12px;
            height: 12px;
            background-color: #10b981;
            border-radius: 50%;
        }

        .marker-progress {
            background-color: #eab308;
            cursor: ew-resize;
            display: none; /* Hidden until date is set */
        }

        .marker-progress::before {
            content: '';
            position: absolute;
            top: 0;
            left: -6px;
            width: 0;
            height: 0;
            border-left: 7px solid transparent;
            border-right: 7px solid transparent;
            border-top: 12px solid #eab308;
        }

        @media print {
            @page { size: landscape; margin: 0.5cm; }
            body { margin: 0; padding: 0; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .controls, .table-container, .popup-menu { display: none !important; }
            .chart-container { border: none !important; overflow: visible !important; padding: 0 !important; margin: 0 !important; }
            .gantt-wrapper { min-width: 100% !important; padding: 0; }
            .gantt-row { page-break-inside: avoid; }
        }
    </style>
</head>
<body>

<div id="drop-overlay">Drop CSV File Here to Import</div>

<div class="controls">
    <div style="display: flex; align-items: center; gap: 8px;">
        <label for="start-date" style="font-weight: bold; font-size: 14px;">Set Start Date:</label>
        <input type="date" id="start-date" onchange="handleStartDateChange()" style="padding: 4px; border: 1px solid #cbd5e1; border-radius: 4px;">
    </div>
    <div style="flex-grow: 1;"></div>
    <input type="file" id="csv-file" accept=".csv" style="display: none;" onchange="handleFileUpload(event)">
    <button class="btn-import" onclick="document.getElementById('csv-file').click()">Import CSV</button>
    <button class="btn-export" onclick="exportCSV()">Export to CSV</button>
    <button class="btn-print" onclick="window.print()">Print to PDF</button>
</div>

<!-- Gantt Chart Top -->
<div class="chart-container">
    <div class="gantt-wrapper chart-relative-wrapper" id="gantt-wrapper">
        <!-- New Progress Markers -->
        <div id="marker-today" class="timeline-marker marker-today"></div>
        <div id="marker-progress" class="timeline-marker marker-progress" onmousedown="startDrag(event)"></div>
        
        <div id="timeline-header" class="timeline-header"></div>
        <div id="chart-body"></div>
    </div>
</div>

<!-- New Status Bar -->
<div id="status-bar" class="status-bar">
    Status: Awaiting project start date to enable progress tracking.
</div>

<!-- Table Bottom -->
<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>Task No.</th>
                <th>Task Title</th>
                <th>Owner</th>
                <th>Start</th>
                <th>Duration</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<!-- Context Menu for Row Insertion -->
<div id="popup-menu" class="popup-menu">
    <div class="popup-item" onclick="executeAdd('above')" id="menu-above">Add row above</div>
    <div class="popup-item" onclick="executeAdd('below')" id="menu-below">Add row below</div>
</div>

<script>
    let tasks = [
        { wbs: '1.0', title: 'Task Title', owner: 'Responsible Party', start: 1, duration: 2 }
    ];

    let activeRowIndex = -1; // Stores which row was targeted by the popup menu
    
    // NEW TRACKING VARIABLES
    let projectStartDate = null;
    let isDraggingProgress = false;
    let progressWeek = 0;

    function getMaxWeeks() {
        let max = 30; // Minimum default
        tasks.forEach(t => {
            const end = t.start + t.duration;
            if (end > max) max = Math.ceil(end); 
        });
        return max;
    }

    function renderChart() {
        const header = document.getElementById('timeline-header');
        const chartBody = document.getElementById('chart-body');
        
        header.innerHTML = '';
        chartBody.innerHTML = '';

        if (tasks.length === 0) return;

        const currentMaxWeeks = getMaxWeeks();

        // Calculate column width to determine if text should be vertical
        let timelineWidth = header.clientWidth;
        if (!timelineWidth) {
            const wrapper = document.querySelector('.gantt-wrapper');
            timelineWidth = Math.max(wrapper.clientWidth - 350, 650);
        }
        const colWidth = timelineWidth / currentMaxWeeks;
        // Text width is approx 14px (for two digits at 11px). +8px buffer = 22px.
        const isNarrow = colWidth < 22; 

        // Build X-Axis Labels
        for (let i = 0; i <= currentMaxWeeks; i++) { 
            const percentage = (i / currentMaxWeeks) * 100;
            const cell = document.createElement('div');
            cell.className = 'timeline-header-cell';
            if (isNarrow) cell.classList.add('vertical-text');
            cell.style.left = `${percentage}%`;
            
            if (projectStartDate) {
                // If a start date is set, map absolute date
                const date = new Date(projectStartDate);
                date.setDate(date.getDate() + i * 7);
                cell.innerText = `${date.getMonth() + 1}/${date.getDate()}`;
            } else {
                // Otherwise fall back to week integers
                cell.innerText = i < 10 ? `0${i}` : `${i}`; 
            }
            
            header.appendChild(cell);
        }

        // Build Gantt Rows
        tasks.forEach(task => {
            const row = document.createElement('div');
            row.className = 'gantt-row';

            const wbsStr = task.wbs.toString().trim();
            const isMajorSection = wbsStr.endsWith('.0') || !wbsStr.includes('.');
            
            if (isMajorSection) {
                row.classList.add('major-section');
            }

            const labels = document.createElement('div');
            labels.className = 'gantt-labels';
            
            const titleClass = isMajorSection ? 'label-title' : 'label-title indented-title';

            labels.innerHTML = `
                <div class="label-wbs">${task.wbs}</div>
                <div class="${titleClass}" title="${task.title}">${task.title}</div>
                <div class="label-owner" title="${task.owner}">${task.owner}</div>
            `;
            row.appendChild(labels);

            // Right side timeline and bar
            const timeline = document.createElement('div');
            timeline.className = 'gantt-timeline';
            timeline.style.backgroundSize = `calc(100% / ${currentMaxWeeks}) 100%`;

            const startPercent = (task.start / currentMaxWeeks) * 100;
            
            if (task.duration === 0) {
                const milestone = document.createElement('div');
                milestone.className = 'gantt-milestone';
                milestone.style.left = `${startPercent}%`;
                timeline.appendChild(milestone);
            } else {
                const widthPercent = (task.duration / currentMaxWeeks) * 100;
                const bar = document.createElement('div');
                bar.className = 'gantt-bar';
                bar.style.left = `${startPercent}%`;
                bar.style.width = `${widthPercent}%`;
                if (task.duration >= 2) bar.innerText = `${task.duration}`; 
                timeline.appendChild(bar);
            }

            row.appendChild(timeline);
            chartBody.appendChild(row);
        });

        // Update markers after chart renders
        updateMarkers();
    }

    function renderTable() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';
        
        if (tasks.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align: center;">No tasks. <button class="btn-import" onclick="addEmptyTask()" style="margin-left: 10px;">Add New Task</button></td></tr>`;
            return;
        }

        tasks.forEach((task, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="text" value="${task.wbs}" onblur="handleWbsChange(${index}, this.value)"></td>
                <td><input type="text" value="${task.title}" oninput="updateTask(${index}, 'title', this.value)"></td>
                <td><input type="text" value="${task.owner}" oninput="updateTask(${index}, 'owner', this.value)"></td>
                <td><input type="number" step="0.1" min="0" value="${task.start}" oninput="updateTask(${index}, 'start', parseFloat(this.value) || 0)"></td>
                <td><input type="number" step="0.1" min="0" value="${task.duration}" oninput="updateTask(${index}, 'duration', parseFloat(this.value) || 0)"></td>
                <td class="actions-cell">
                    <button class="btn-add-inline" onclick="openMenu(event, ${index})" title="Add Row Here">+</button>
                    <button class="btn-action" onclick="moveTask(${index}, -1)" title="Move Up">↑</button>
                    <button class="btn-action" onclick="moveTask(${index}, 1)" title="Move Down">↓</button>
                    <button class="btn-delete" onclick="deleteTask(${index})" title="Delete">✕</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function renderAll() {
        renderTable();
        renderChart();
    }

    function openMenu(e, index) {
        e.stopPropagation();
        activeRowIndex = index;
        const menu = document.getElementById('popup-menu');
        const targetWbs = tasks[index].wbs || 'row';
        
        document.getElementById('menu-above').innerText = `Add row above ${targetWbs}`;
        document.getElementById('menu-below').innerText = `Add row below ${targetWbs}`;
        
        menu.style.display = 'block';
        
        // Ensure menu stays within bounds
        let posX = e.pageX;
        let posY = e.pageY;
        
        // rough boundary checks
        if(window.innerWidth - posX < 160) posX -= 160;
        
        menu.style.left = posX + 'px';
        menu.style.top = posY + 'px';
    }

    function closeMenu() {
        document.getElementById('popup-menu').style.display = 'none';
    }

    // Close popup if clicking outside
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.popup-menu') && !e.target.closest('.btn-add-inline')) {
            closeMenu();
        }
    });

    function addEmptyTask() {
        tasks.push({ wbs: '1.0', title: '', owner: '', start: 0, duration: 1 });
        renderAll();
    }

    function executeAdd(position) {
        if (activeRowIndex === -1) return;
        
        const targetTask = tasks[activeRowIndex];
        const wbsStr = (targetTask.wbs || '').toString().trim();
        
        let major = parseInt(wbsStr) || 1;
        let minor = 0;
        if (wbsStr.includes('.')) {
            const parsed = parseInt(wbsStr.split('.')[1]);
            if (!isNaN(parsed)) minor = parsed;
        }

        let newWbs = '';
        let insertIndex = activeRowIndex;
        let newStart = targetTask.start;

        if (position === 'above') {
            newWbs = `${major}.${minor}`;
            insertIndex = activeRowIndex;
            shiftMinorWBS(activeRowIndex, major, 1);
        } else {
            newWbs = `${major}.${minor + 1}`;
            insertIndex = activeRowIndex + 1;
            newStart = targetTask.start + targetTask.duration;
            shiftMinorWBS(activeRowIndex + 1, major, 1);
        }

        const newTask = {
            wbs: newWbs,
            title: '',
            owner: '',
            start: newStart,
            duration: 1
        };

        tasks.splice(insertIndex, 0, newTask);
        closeMenu();
        renderAll();
    }

    function shiftMinorWBS(startIndex, targetMajor, shiftAmount) {
        for (let i = startIndex; i < tasks.length; i++) {
            const wbsStr = (tasks[i].wbs || '').toString().trim();
            const major = parseInt(wbsStr);
            
            if (major === targetMajor) {
                if (wbsStr.includes('.')) {
                    let minor = parseInt(wbsStr.split('.')[1]);
                    if(isNaN(minor)) minor = 0;
                    tasks[i].wbs = `${major}.${minor + shiftAmount}`;
                } else {
                    tasks[i].wbs = `${major}.${shiftAmount}`;
                }
            } else if (!isNaN(major)) {
                // If we reach a different integer branch, stop cascading to prevent altering unrelated sections
                break;
            }
        }
    }

    function handleWbsChange(index, value) {
        if (/^\d+\.?$/.test(value)) {
            let baseInt = parseInt(value);
            let nextWbs = `${baseInt}.0`;

            if (index > 0) {
                const prevWbs = tasks[index - 1].wbs.toString();
                const prevInt = parseInt(prevWbs);
                if (prevInt === baseInt && prevWbs.includes('.')) {
                    const parts = prevWbs.split('.');
                    if (parts.length === 2) {
                        const nextDec = parseInt(parts[1]) + 1;
                        nextWbs = `${baseInt}.${nextDec}`;
                    }
                }
            }
            tasks[index].wbs = nextWbs;
            renderAll();
        } else {
            tasks[index].wbs = value;
            renderChart();
        }
    }

    function updateTask(index, field, value) {
        tasks[index][field] = value;
        renderChart(); 
    }

    function moveTask(index, direction) {
        if (index + direction < 0 || index + direction >= tasks.length) return;
        const temp = tasks[index];
        tasks[index] = tasks[index + direction];
        tasks[index + direction] = temp;
        renderAll();
    }

    function deleteTask(index) {
        tasks.splice(index, 1);
        renderAll();
    }

    function exportCSV() {
        let csvContent = "Task No.,Task Title,Owner,Start (Week),Duration (Weeks)\n";
        tasks.forEach(t => {
            let safeTitle = (t.title || '').replace(/"/g, '""');
            let safeOwner = (t.owner || '').replace(/"/g, '""');
            csvContent += `"${t.wbs}","${safeTitle}","${safeOwner}",${t.start},${t.duration}\n`;
        });
        
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", "project_schedule.csv");
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function handleFileUpload(event) {
        const file = event.target.files[0];
        if (file) processFile(file);
    }

    function processFile(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            const lines = content.split(/\r?\n/).filter(line => line.trim() !== '');
            if(lines.length > 1) {
                let newTasks = [];
                for(let i = 1; i < lines.length; i++) {
                    let row = [];
                    let inQuotes = false;
                    let currentVal = '';
                    for(let char of lines[i]) {
                        if (char === '"') inQuotes = !inQuotes;
                        else if (char === ',' && !inQuotes) { row.push(currentVal); currentVal = ''; }
                        else currentVal += char;
                    }
                    row.push(currentVal);
                    
                    if(row.length >= 5) {
                        newTasks.push({
                            wbs: row[0].trim(),
                            title: row[1].trim(),
                            owner: row[2].trim(),
                            start: parseFloat(row[3]) || 0,
                            duration: parseFloat(row[4]) || 0
                        });
                    }
                }
                if(newTasks.length > 0) {
                    tasks = newTasks;
                    renderAll();
                }
            }
        };
        reader.readAsText(file);
    }

    const overlay = document.getElementById('drop-overlay');
    window.addEventListener('dragover', (e) => { e.preventDefault(); overlay.style.display = 'flex'; });
    window.addEventListener('dragleave', (e) => {
        e.preventDefault();
        if (e.clientX === 0 || e.clientY === 0) overlay.style.display = 'none';
    });
    window.addEventListener('drop', (e) => {
        e.preventDefault();
        overlay.style.display = 'none';
        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) processFile(e.dataTransfer.files[0]);
    });

    // --- TIMELINE TRACKER AND STATUS LOGIC --- //

    function handleStartDateChange() {
        const val = document.getElementById('start-date').value;
        if (val) {
            // Split natively to avoid timezone offset shifts in Javascript parsing
            const [year, month, day] = val.split('-');
            projectStartDate = new Date(year, month - 1, day);
            progressWeek = calculateTodayWeek(); 
            document.getElementById('marker-progress').style.display = 'block';
        } else {
            projectStartDate = null;
            document.getElementById('marker-progress').style.display = 'none';
        }
        renderChart();
    }

    function calculateTodayWeek() {
        if (!projectStartDate) return 0;
        const today = new Date();
        const diffTime = today.getTime() - projectStartDate.getTime();
        // Convert ms difference to weeks
        const diffWeeks = diffTime / (1000 * 60 * 60 * 24 * 7);
        // Minimum week is 0
        return Math.max(0, diffWeeks);
    }

    function updateMarkers() {
        const todayMarker = document.getElementById('marker-today');
        const progressMarker = document.getElementById('marker-progress');
        const currentMaxWeeks = getMaxWeeks();
        const timelineLeftOffset = 350; // The fixed width of the left-hand text labels
        
        if (projectStartDate) {
            todayMarker.style.display = 'block';
            const todayWk = calculateTodayWeek();
            const todayPercent = (todayWk / currentMaxWeeks) * 100;
            todayMarker.style.left = `calc(${timelineLeftOffset}px + ${todayPercent}%)`;
            
            // Hide the today marker if it's way out of bounds
            if (todayWk > currentMaxWeeks || todayWk < 0) todayMarker.style.display = 'none';
        } else {
            todayMarker.style.display = 'none';
        }

        const progPercent = (progressWeek / currentMaxWeeks) * 100;
        progressMarker.style.left = `calc(${timelineLeftOffset}px + ${progPercent}%)`;
        
        updateStatus();
    }

    // Drag events for yellow progress marker
    function startDrag(e) {
        if (!projectStartDate) return; // Prevent drag if no date is set
        isDraggingProgress = true;
        document.addEventListener('mousemove', onDrag);
        document.addEventListener('mouseup', stopDrag);
    }

    function onDrag(e) {
        if (!isDraggingProgress) return;
        
        // Find the active timeline bounding box so dragging aligns with the CSS scaling 
        const timelineEls = document.querySelectorAll('.gantt-timeline');
        if (timelineEls.length === 0) return;
        
        const timelineRect = timelineEls[0].getBoundingClientRect();
        let offsetX = e.clientX - timelineRect.left;
        
        // Clamp dragging bounds
        if (offsetX < 0) offsetX = 0;
        if (offsetX > timelineRect.width) offsetX = timelineRect.width;

        const currentMaxWeeks = getMaxWeeks();
        progressWeek = (offsetX / timelineRect.width) * currentMaxWeeks;
        
        updateMarkers();
    }

    function stopDrag(e) {
        isDraggingProgress = false;
        document.removeEventListener('mousemove', onDrag);
        document.removeEventListener('mouseup', stopDrag);
    }

    function updateStatus() {
        const statusBar = document.getElementById('status-bar');
        if (!projectStartDate) {
            statusBar.innerText = "Status: Set a project start date to enable progress tracking.";
            statusBar.style.borderLeftColor = "var(--primary-color)";
            return;
        }

        const todayWk = calculateTodayWeek();
        // Locate tasks happening right at the yellow tracker
        const activeTasks = tasks.filter(t => t.start <= progressWeek && (t.start + t.duration) >= progressWeek);
        
        let statusText = "";
        let diffWeeks = progressWeek - todayWk;
        
        if (Math.abs(diffWeeks) < 0.2) {
            statusText = "Project is on schedule. ";
            statusBar.style.borderLeftColor = "#10b981"; // green
        } else if (diffWeeks > 0) {
            statusText = `Project is ahead of schedule by ${Math.abs(diffWeeks).toFixed(1)} weeks! `;
            statusBar.style.borderLeftColor = "#3b82f6"; // blue
        } else {
            statusText = `Project is behind schedule by ${Math.abs(diffWeeks).toFixed(1)} weeks. `;
            statusBar.style.borderLeftColor = "#ef4444"; // red
        }

        if (activeTasks.length > 0) {
            const taskNames = activeTasks.map(t => t.title).join(", ");
            statusText += `Current phase(s) indicated: ${taskNames}.`;
            if (diffWeeks < -0.2) {
                statusText += " Delays here will push back subsequent dependent phases.";
            }
        } else {
            statusText += "No active tasks at the current marker position.";
        }

        statusBar.innerText = statusText;
    }

    // Re-render the chart dynamically if the user resizes the browser window
    window.addEventListener('resize', renderChart);

    renderAll();
</script>

</body>
